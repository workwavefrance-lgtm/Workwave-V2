<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #0A0A0A; }
  body { font-family: "Geist", "Helvetica Neue", "Inter", Arial, sans-serif; color: #FAFAFA; -webkit-font-smoothing: antialiased; }
  #stage { position: relative; width: 1080px; height: 1920px; }

  .glow {
    position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
    width: 900px; height: 900px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,90,54,0.18), rgba(255,90,54,0) 62%);
    filter: blur(10px);
  }
  .be-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 12px; display: flex; }
  .be-bar i { flex: 1; }
  .be-bar .k { background: #1A1A1A; } .be-bar .y { background: #FFD90C; } .be-bar .r { background: #F31830; }

  .scene { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 90px; will-change: opacity, transform; }
  .eyebrow { font-size: 30px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase; color: #FF6B4A; margin-bottom: 40px; }
  .brand { font-size: 132px; font-weight: 800; letter-spacing: -0.05em; line-height: 1; } .brand .d { color: #FF5A36; }
  .wave { margin-top: 34px; }
  .big { font-size: 118px; font-weight: 800; letter-spacing: -0.045em; line-height: 1.02; } .big .accent { color: #FF5A36; }

  .props { display: flex; flex-direction: column; gap: 30px; align-items: center; }
  .prop { font-size: 58px; font-weight: 700; letter-spacing: -0.02em; } .prop .c { color: #FF6B4A; }
  .prop small { display: block; font-size: 30px; font-weight: 500; color: #71717A; margin-top: 6px; }
  .kicker { font-size: 44px; font-weight: 600; color: #D4D4D8; margin-bottom: 30px; }
  .count { font-size: 150px; font-weight: 800; letter-spacing: -0.05em; line-height: 1; } .count .u { color: #FF5A36; }
  .url { margin-top: 56px; font-size: 46px; font-weight: 700; border: 2px solid rgba(255,90,54,0.5); background: rgba(255,90,54,0.08); padding: 22px 46px; border-radius: 999px; }

  /* Drapeau belge qui ondule (colonnes) */
  #flagwrap { position: absolute; top: 620px; left: 50%; margin-left: -390px; width: 780px; height: 500px; opacity: 0; will-change: opacity, transform; }
  #flag { position: absolute; inset: 0; border-radius: 18px; overflow: hidden; box-shadow: 0 40px 120px rgba(0,0,0,0.6); }
  .fcol { position: absolute; top: 0; height: 100%; will-change: transform, filter; }
  #flaglabel { position: absolute; top: 1180px; width: 100%; text-align: center; font-size: 118px; font-weight: 800; letter-spacing: -0.045em; line-height: 1.02; opacity: 0; will-change: opacity, transform; }
  #flaglabel .accent { color: #FF5A36; }
</style>
</head>
<body>
<div id="stage">
  <div class="glow" id="glow"></div>

  <!-- Scène 1 : marque -->
  <div class="scene" id="s1">
    <div class="eyebrow">Le Free du bâtiment</div>
    <div class="brand">Workwave<span class="d">.</span></div>
    <svg class="wave" width="230" height="18" viewBox="0 0 230 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 10 Q 31 -4 60 10 T 118 10 T 176 10 T 228 10" stroke="#FF5A36" stroke-width="3.6" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Scène 2 : GRAND DRAPEAU qui ondule + annonce -->
  <div id="flagwrap"><div id="flag"></div></div>
  <div id="flaglabel">La Belgique,<br><span class="accent">on arrive.</span></div>

  <!-- Scène 3 : valeur -->
  <div class="scene" id="s3">
    <div class="props">
      <div class="prop"><span class="c">9,90 €</span> le contact<small>Tu vois le chantier avant de payer</small></div>
      <div class="prop">0 abonnement · 0 commission<small>Ce que tu gagnes reste à toi</small></div>
      <div class="prop">Tes 2 premiers <span class="c">offerts</span><small>Sans carte bancaire</small></div>
    </div>
  </div>

  <!-- Scène 4 : compte à rebours -->
  <div class="scene" id="s4">
    <div class="kicker">Artisans belges, disponible dans</div>
    <div class="count">24<span class="u">H</span></div>
    <div class="url">workwave.fr/pro</div>
  </div>

  <div class="be-bar"><i class="k"></i><i class="y"></i><i class="r"></i></div>
</div>

<script>
  // Construire le drapeau en colonnes verticales (3 bandes noir/jaune/rouge)
  var NCOL = 64;
  var flag = document.getElementById("flag");
  var cols = [];
  for (var i = 0; i < NCOL; i++) {
    var c = document.createElement("div");
    c.className = "fcol";
    var x = (i + 0.5) / NCOL;
    c.style.background = x < 1/3 ? "#1A1A1A" : (x < 2/3 ? "#FFD90C" : "#F31830");
    c.style.left = (i / NCOL * 100) + "%";
    c.style.width = (100 / NCOL + 0.25) + "%";
    flag.appendChild(c);
    cols.push(c);
  }

  window.TOTAL = 9700;
  function clamp(x){ return Math.max(0, Math.min(1, x)); }
  function easeOut(x){ return 1 - Math.pow(1 - x, 3); }

  function sceneOpacity(t, a, b, IN, OUT){
    if (t < a || t > b) return 0;
    var local = t - a, dur = b - a;
    return Math.min(easeOut(clamp(local / IN)), easeOut(clamp((dur - local) / OUT)));
  }

  var SCENES = [
    { el: "s1", a: 0,    b: 2300 },
    { el: "s3", a: 5200, b: 7500 },
    { el: "s4", a: 7500, b: 9700 }
  ];
  var FLAG_A = 2300, FLAG_B = 5200;

  window.renderFrame = function(t){
    SCENES.forEach(function(s){
      var el = document.getElementById(s.el);
      var op = sceneOpacity(t, s.a, s.b, 520, 420);
      el.style.opacity = op;
      el.style.transform = "translateY(" + (1 - clamp(op)) * 34 + "px)";
    });

    // Drapeau : opacité de la scène 2 + ondulation permanente
    var fop = sceneOpacity(t, FLAG_A, FLAG_B, 560, 440);
    var fw = document.getElementById("flagwrap");
    var fl = document.getElementById("flaglabel");
    fw.style.opacity = fop;
    fl.style.opacity = fop;
    fl.style.transform = "translateY(" + (1 - clamp(fop)) * 34 + "px)";
    // léger balancement d'ensemble
    var sway = Math.sin(t / 700) * 2.2;
    fw.style.transform = "rotate(" + sway + "deg)";

    // Onde par colonne (grand mouvement)
    for (var i = 0; i < cols.length; i++) {
      var x = (i + 0.5) / NCOL;
      var phase = x * Math.PI * 3.4 - t / 165;
      var ty = Math.sin(phase) * 34;              // amplitude verticale
      var sy = 1 + Math.cos(phase) * 0.06;        // étirement cloth
      var bright = 0.66 + 0.34 * (0.5 + 0.5 * Math.cos(phase)); // ombres/lumière des plis
      cols[i].style.transform = "translateY(" + ty + "px) scaleY(" + sy + ")";
      cols[i].style.filter = "brightness(" + bright + ")";
    }

    var g = document.getElementById("glow");
    g.style.opacity = 0.75 + 0.25 * Math.sin(t / 900);
  };

  window.renderFrame(0);
</script>
</body>
</html>
